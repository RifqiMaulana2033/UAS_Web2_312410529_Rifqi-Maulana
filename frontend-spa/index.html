<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Report Warga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="app">
        <nav class="bg-blue-700 text-white shadow-md">
            <div class="container mx-auto px-6 py-4 flex justify-between items-center">
                <a href="#" class="text-2xl font-bold tracking-wider">E-Report<span class="text-yellow-400">Warga</span></a>
                <div class="space-x-4 flex items-center">
                    <router-link to="/" class="hover:text-blue-200 transition">Beranda</router-link>
                    
                    <router-link v-if="isLoggedIn" to="/dashboard" class="hover:text-blue-200 transition font-bold">
                        {{ userRole === 'admin' ? 'Dashboard Admin' : 'Panel Aduan Warga' }}
                    </router-link>
                    
                    <router-link v-if="!isLoggedIn" to="/login" class="bg-white text-blue-700 px-5 py-2 rounded-full font-bold hover:bg-gray-100 transition shadow">Login</router-link>
                    <a v-else href="#" @click.prevent="logout" class="bg-red-500 text-white px-5 py-2 rounded-full font-bold hover:bg-red-600 transition shadow">Logout</a>
                </div>
            </div>
        </nav>

        <main class="container mx-auto px-6 py-8">
            <router-view></router-view>
        </main>
    </div>

    <script src="assets/js/components/Home.js"></script>
    <script src="assets/js/components/Login.js"></script>
    <script src="assets/js/components/Dashboard.js"></script>
    
    <script src="assets/js/app.js"></script>
</body>
</html>
